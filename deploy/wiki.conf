server {
    listen 80;
    server_name wiki.sgcore.dev;

    client_max_body_size 1m;

    location / {
        include /etc/nginx/proxy_params;
        proxy_pass http://wikipedia-retriever:8000;

        # Batch retrievals fan out to many Wikipedia fetches; give them room.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
