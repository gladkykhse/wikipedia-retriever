global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: "rustfs-otel-collector"
    static_configs:
      - targets: ["rustfs-otel-collector:8888"]

  - job_name: "rustfs"
    static_configs:
      - targets: ["rustfs-otel-collector:8889"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "speedtest"
    static_configs:
      - targets: ["speedtest-exporter:9798"]

  - job_name: "wikipedia-retriever"
    metrics_path: /metrics
    static_configs:
      - targets: ["wikipedia-retriever:8000"]
        labels:
          service: wikipedia-retriever
