services:
  wikipedia-retriever:
    build:
      context: .
      dockerfile: Dockerfile
    image: wikipedia-retriever:latest
    container_name: wikipedia-retriever
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m
      - /home/app/.cache:size=64m
    env_file: .env
    environment:
      RETRIEVER_LOG_LEVEL: ${RETRIEVER_LOG_LEVEL:-INFO}
      RETRIEVER_HTTP_CONCURRENCY: ${RETRIEVER_HTTP_CONCURRENCY:-8}
      RETRIEVER_LOG_FILE: /var/log/wiki/app.log
    volumes:
      # Host-side log directory; already mounted read-only into Alloy as /var/log/host_logs.
      - /var/log/wiki:/var/log/wiki
    networks:
      - web-gateway
      - monitor-net
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).read(); sys.exit(0)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web-gateway:
    external: true
  monitor-net:
    external: true
